<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شهادة حضور للمعلمات - ساعة الذكاء الاصطناعي</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#f7edf3;font-family:"Tajawal","Cairo","Arial",Tahoma,sans-serif;color:#11201f}
:root{--rose:#8b315f;--rose-dark:#612044;--plum:#4d2b73;--soft-rose:#fff7fb;--moe:#007267;--moe-dark:#004b45;--blue:#06477b;--gold:#b88938;--soft:#f7fbfa}
.form-panel{width:min(1150px,96vw);margin:10px auto;padding:15px;background:linear-gradient(180deg,#fff,#fff8fc);border-radius:14px;box-shadow:0 4px 15px rgba(0,0,0,.10);display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.form-panel .full{grid-column:1/-1}.form-panel label{display:block;margin-bottom:4px;font-size:12px;font-weight:800;color:var(--rose-dark)}
.form-panel input,.form-panel textarea{width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:7px;font-size:14px;text-align:right}.form-panel textarea{height:82px}
.actions{grid-column:1/-1;text-align:center;padding-top:10px}button{border:0;border-radius:9px;padding:10px 30px;background:linear-gradient(135deg,var(--rose),var(--plum));color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin:0 5px}
.stage{width:min(1150px,96vw);margin:0 auto 20px}.cert-page{width:100%;aspect-ratio:1.414/1;background:#fff;position:relative;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.10);padding:3.05% 5.4%;margin-bottom:20px;page-break-after:always;border:1px solid rgba(0,114,103,.20)}
.cert-page:before{content:"";position:absolute;inset:16px;border:3px solid var(--rose);border-radius:18px;pointer-events:none}.cert-page:after{content:"";position:absolute;inset:27px;border:1.8px solid rgba(184,137,56,.65);border-radius:13px;pointer-events:none}.corner{position:absolute;width:120px;height:120px;border-color:var(--gold);opacity:.40}.corner.tl{top:22px;left:22px;border-top:10px solid;border-left:10px solid;border-radius:18px 0 0 0}.corner.br{bottom:22px;right:22px;border-bottom:10px solid;border-right:10px solid;border-radius:0 0 18px 0}
.header-band{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1.15fr 1fr;align-items:start;gap:12px;direction:ltr;margin:12px auto 2px;min-height:112px}.moe{width:100%;text-align:center;color:var(--moe-dark);line-height:1}.moe-svg{width:180px;height:82px;margin:0 auto 2px;display:block}.moe-ar{font-size:23px;font-weight:900;letter-spacing:.2px}.moe-en{font-size:14px;color:#3b3f46;margin-top:4px;font-weight:600}.hour-logo{text-align:center;direction:ltr;font-weight:900;color:#080025;font-size:46px;line-height:.78;margin-top:0;font-family:Arial,Helvetica,sans-serif}.hour-logo .ai{font-size:68px}.hour-logo .grad{background:linear-gradient(90deg,#130052,#9300ff,#00bdd6);-webkit-background-clip:text;background-clip:text;color:transparent}.code-box{width:100%;text-align:center;direction:ltr}.code-grid{display:grid;grid-template-columns:repeat(2,50px);gap:7px;justify-content:center}.code-grid div{height:50px;border-radius:8px;background:#050505;color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;font-family:Arial,Helvetica,sans-serif}.code-url{color:var(--moe);font-size:14px;margin-top:5px;font-weight:700}.title-wrap{position:relative;z-index:2;text-align:center;margin-top:-24px}.title{display:inline-block;color:var(--rose-dark);font-size:78px;font-weight:900;margin:0;font-family:"Diwani Letter","Aref Ruqaa","Traditional Arabic","Times New Roman",serif;letter-spacing:.5px;text-shadow:0 2px 0 rgba(184,137,56,.12)}.title:after{content:"";display:block;width:210px;height:4px;margin:0 auto 0;background:linear-gradient(90deg,transparent,var(--gold),var(--rose),var(--gold),transparent);border-radius:99px}.content-area{position:relative;z-index:2;margin-top:2px;text-align:center;font-weight:900}.intro{font-size:24px;line-height:1.15;margin:0 auto 3px;color:#3d2a35}.line{display:flex;justify-content:center;align-items:baseline;gap:8px;font-size:27px;line-height:1.16;margin-bottom:3px;white-space:nowrap}.fill{color:var(--rose);font-weight:900;border-bottom:1px dashed rgba(139,49,95,.45);min-width:230px;padding:0 10px;font-size:29px}.teacher-name{font-size:34px;color:var(--rose-dark)}.workshop{font-size:33px;margin:6px auto 3px;font-weight:900;color:var(--plum);line-height:1.08;font-family:"Traditional Arabic","Times New Roman",serif}.blessing{font-size:24px;color:#7a4d12;font-weight:900;margin-top:3px;line-height:1.05}.sig-container{position:absolute;z-index:2;bottom:5.2%;left:8.5%;right:8.5%;display:grid;grid-template-columns:1fr 1fr;gap:34%;align-items:flex-start;direction:ltr}.sig-item{width:100%;text-align:center}.sig-label{font-size:21px;font-weight:900;color:var(--rose-dark);margin-bottom:2px}.sig-name-val{font-size:20px;font-weight:900;color:#4a3540;margin-bottom:2px;min-height:26px}.sig-img-box{height:62px;display:flex;justify-content:center;align-items:center}.sig-img-box img{max-height:100%;max-width:185px;object-fit:contain}.sig-date{font-size:14px;color:#566;margin-top:0;font-weight:800}.design-credit{position:absolute;z-index:5;bottom:10px;left:18px;font-size:12px;color:#7b8785;font-weight:800;background:rgba(255,255,255,.80);padding:3px 8px;border-radius:99px}.credit{display:none}.form-credit{grid-column:1/-1;text-align:left;color:#7b8785;font-size:13px;font-weight:800;padding-top:2px}.form-credit span{background:#f6faf9;border:1px solid #d9e8e5;border-radius:999px;padding:4px 10px}
@page{size:A4 landscape;margin:0}
@media print{.form-panel{display:none!important}.form-credit{display:none!important}html,body{background:#fff;margin:0;width:297mm;height:210mm}.stage{width:297mm;margin:0}.cert-page{box-shadow:none;margin:0;width:297mm;height:210mm;aspect-ratio:auto;padding:7mm 14mm;border:0;break-after:page;page-break-after:always}.cert-page:before{inset:7mm}.cert-page:after{inset:10.5mm}.header-band{min-height:106px;margin-top:8mm;margin-bottom:0}.title-wrap{margin-top:-22px}.title{font-size:76px}.content-area{margin-top:6px}.line{font-size:26px;line-height:1.18;margin-bottom:3px}.fill{font-size:28px}.teacher-name{font-size:34px}.workshop{font-size:33px;margin:6px auto 3px}.intro,.blessing{font-size:24px}.sig-container{bottom:13mm}.sig-img-box{height:55px}.design-credit{display:none!important}*{print-color-adjust:exact!important;-webkit-print-color-adjust:exact!important}}
@media(max-width:800px){.form-panel{grid-template-columns:1fr}.title{font-size:52px}.line{font-size:20px;white-space:normal}.workshop{font-size:26px}.header-band{transform:scale(.86);transform-origin:top center}.sig-container{left:5%;right:5%}}
.title-wrap{margin-top:-6px}
.title{color:var(--rose-dark);font-family:"Amiri Diwan","Diwani Letter","Aref Ruqaa","Arabic Typesetting","Traditional Arabic","Times New Roman",serif;letter-spacing:0;line-height:.9;white-space:nowrap;text-shadow:0 2px 0 rgba(184,137,56,.18),0 0 1px rgba(97,32,68,.28),0 8px 18px rgba(97,32,68,.10)}
.title:after{margin-top:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--rose),var(--gold),transparent)}
.content-area{margin-top:26px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding-inline:34px;font-family:"Tajawal","Cairo","Noto Naskh Arabic","Traditional Arabic",Arial,sans-serif}
.content-area:before,.content-area:after{content:"";width:min(280px,42%);height:2px;background:linear-gradient(90deg,transparent,rgba(184,137,56,.72),rgba(139,49,95,.72),rgba(184,137,56,.72),transparent);border-radius:99px}
.content-area:before{margin-bottom:3px}.content-area:after{margin-top:5px}
.intro{display:flex;justify-content:center;align-items:baseline;gap:8px;direction:rtl;font-size:32px;line-height:1.22;margin:0 auto 4px;color:#3d2a35;max-width:100%;white-space:nowrap}
.line{display:flex;justify-content:center;align-items:baseline;gap:8px;font-size:33px;line-height:1.22;margin-bottom:4px;white-space:normal;flex-wrap:wrap;max-width:100%}
.fill{display:inline-block;color:var(--rose);font:inherit;font-weight:900;border-bottom:1px solid transparent;min-width:clamp(160px,30vw,270px);max-width:min(72%,620px);padding-inline-start:0;padding-inline-end:10px;text-align:start;direction:rtl;overflow-wrap:anywhere;word-break:break-word;line-height:1.18;vertical-align:baseline}
.intro .fill{flex:0 1 40ch;min-width:0;max-width:62%;white-space:nowrap;overflow-wrap:normal;word-break:normal}
.teacher-name{font-size:inherit;color:var(--rose-dark);min-width:clamp(220px,38vw,420px);max-width:min(76%,720px)}
.workshop{font-size:38px;margin:8px auto 4px;font-weight:900;color:var(--plum);line-height:1.08;font-family:"Aref Ruqaa","Traditional Arabic","Times New Roman",serif;max-width:100%;white-space:nowrap;text-shadow:0 1px 0 rgba(255,255,255,.7)}
.blessing{font-size:32px;color:#7a4d12;font-weight:900;margin-top:4px;line-height:1.12}
@media print{.title-wrap{margin-top:-4px}.title{font-size:76px}.content-area{margin-top:18px;gap:2px;padding-inline:10mm}.content-area:before,.content-area:after{width:78mm}.intro{font-size:32px}.intro .fill{flex-basis:128mm;max-width:128mm;white-space:nowrap;overflow-wrap:normal;word-break:normal}.line{font-size:32px;line-height:1.2;margin-bottom:3px}.fill{text-align:start;padding-inline-start:0;padding-inline-end:10px;max-width:min(72%,170mm)}.teacher-name{font-size:inherit;max-width:min(76%,185mm)}.workshop{font-size:36px;white-space:nowrap;margin-block:7px 4px}.blessing{font-size:31px}}
@media(max-width:800px){.content-area{margin-top:18px;padding-inline:12px}.content-area:before,.content-area:after{width:56%}.intro,.line{font-size:24px}.workshop{font-size:28px;white-space:normal}.blessing{font-size:24px}}
</style>
</head>
<body>
<section class="form-panel">
  <div class="full"><label>أسماء المعلمات (اسم في كل سطر)</label><textarea id="inNames" placeholder="أدخلي أسماء المعلمات هنا..."></textarea></div>
  <div><label>اسم المدرسة</label><input id="inSchool" placeholder="المدرسة..."></div>
  <div><label>التاريخ الهجري</label><input id="inDate" placeholder="١٤٤٧/٠٦/١١ هـ"></div>
  <div><label>مديرة المدرسة</label><input id="inPName" placeholder="اسم المديرة"></div>
  <div><label>منسقة المدرسة</label><input id="inCName" placeholder="اسم المنسقة"></div>
  <div><label>توقيع المديرة</label><input type="file" id="fP" accept="image/*"></div>
  <div><label>توقيع المنسقة</label><input type="file" id="fC" accept="image/*"></div>
  <div class="actions"><button onclick="update()">تحديث الشهادات</button><button onclick="window.print()" style="background:#6b3b83">طباعة الآن</button></div>
  <div class="form-credit"><span>تصميم : عبدالرحمن الثقفي</span></div>
</section>
<main id="view" class="stage"></main>
<script>
let pImg="",cImg="";
const esc=s=>String(s||"").replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
const loadImg=(id,key)=>{document.getElementById(id).onchange=e=>{const r=new FileReader();r.onload=()=>{if(key==='p')pImg=r.result;if(key==='c')cImg=r.result;update()};if(e.target.files[0])r.readAsDataURL(e.target.files[0])}};
loadImg('fP','p');loadImg('fC','c');
function update(){
 const names=document.getElementById('inNames').value.split('\n').map(x=>x.trim()).filter(Boolean).slice(0,50);
 const school=esc(document.getElementById('inSchool').value),date=esc(document.getElementById('inDate').value),pName=esc(document.getElementById('inPName').value),cName=esc(document.getElementById('inCName').value);
 const box=document.getElementById('view');box.innerHTML="";
 names.forEach(n=>{box.innerHTML+=`
 <section class="cert-page">
   <div class="corner tl"></div><div class="corner br"></div>
   <div class="header-band">
     <div class="moe"><svg class="moe-svg" viewBox="0 0 220 92" aria-label="شعار وزارة التعليم">
       <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0c7d71"/><stop offset="1" stop-color="#69aaa1"/></linearGradient></defs>
       <g fill="url(#g)">
        <circle cx="26" cy="22" r="7"/><circle cx="49" cy="22" r="7"/><circle cx="72" cy="26" r="7"/><circle cx="95" cy="36" r="7"/><circle cx="110" cy="48" r="7"/><circle cx="125" cy="36" r="7"/><circle cx="148" cy="26" r="7"/><circle cx="171" cy="22" r="7"/><circle cx="194" cy="22" r="7"/>
        <circle cx="27" cy="45" r="6.5"/><circle cx="49" cy="43" r="6.5"/><circle cx="70" cy="48" r="6.5"/><circle cx="90" cy="58" r="6.5"/><circle cx="110" cy="70" r="6.5"/><circle cx="130" cy="58" r="6.5"/><circle cx="150" cy="48" r="6.5"/><circle cx="171" cy="43" r="6.5"/><circle cx="193" cy="45" r="6.5"/>
        <circle cx="28" cy="68" r="6"/><circle cx="51" cy="66" r="6"/><circle cx="74" cy="72" r="6"/><circle cx="146" cy="72" r="6"/><circle cx="169" cy="66" r="6"/><circle cx="192" cy="68" r="6"/>
       </g>
      </svg><div class="moe-ar">وزارة التعليم</div><div class="moe-en">Ministry of Education</div></div>
     <div><div class="hour-logo"><div>Hour</div><div>of <span class="ai">A<span class="grad">I</span></span></div></div></div>
     <div class="code-box"><div class="code-grid"><div>C</div><div>O</div><div>D</div><div>E</div></div><div class="code-url">www.code.org</div></div>
   </div>
   <div class="title-wrap"><h1 class="title">شهادة حضور</h1></div>
   <div class="content-area">
     <p class="intro">تُقرُّ إدارة مدرسة / <span class="fill">${school}</span></p>
     <div class="line"><span>بأن المعلمة /</span><span class="fill teacher-name">${esc(n)}</span></div>
     <div class="workshop">قد حضرت ورشة عمل (ساعة الذكاء الاصطناعي في التعليم)</div>
     <div class="line"><span>بواقع 3 ساعات والمقامة بالمدرسة بتاريخ</span><span class="fill">${date}</span></div>
     <div class="blessing">سائلين الله لها دوام التوفيق والتميّز</div>
   </div>
   <div class="sig-container">
     <div class="sig-item"><div class="sig-label">مديرة المدرسة</div><div class="sig-name-val">${pName}</div><div class="sig-img-box">${pImg?`<img src="${pImg}">`:''}</div><div class="sig-date">تاريخ التوقيع: ${date}</div></div>
     <div class="sig-item"><div class="sig-label">منسقة المدرسة</div><div class="sig-name-val">${cName}</div><div class="sig-img-box">${cImg?`<img src="${cImg}">`:''}</div><div class="sig-date">تاريخ التوقيع: ${date}</div></div>
   </div>
   <div class="design-credit">تصميم : عبدالرحمن الثقفي</div>
 </section>`});
}
</script>
</body>
</html>
